<div class="fa-toolbar" *ngIf="visible" (click)="$event.stopPropagation()">

  <span class="fa-label">Aligner</span>

  <div class="fa-sep"></div>

  <!-- ─── Horizontal group ─── -->
  <div class="fa-group-label">H</div>

  <button class="fa-btn" type="button" (click)="align('left')" title="Aligner à gauche">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="2" width="2" height="14" rx="1" fill="currentColor"/>
      <rect x="5" y="5" width="10" height="3" rx="1" fill="currentColor"/>
      <rect x="5" y="10" width="7" height="3" rx="1" fill="currentColor"/>
    </svg>
  </button>

  <button class="fa-btn" type="button" (click)="align('centerH')" title="Centrer horizontalement">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="8" y="2" width="2" height="14" rx="1" fill="currentColor"/>
      <rect x="3" y="5" width="12" height="3" rx="1" fill="currentColor"/>
      <rect x="4.5" y="10" width="9" height="3" rx="1" fill="currentColor"/>
    </svg>
  </button>

  <button class="fa-btn" type="button" (click)="align('right')" title="Aligner à droite">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="14" y="2" width="2" height="14" rx="1" fill="currentColor"/>
      <rect x="3" y="5" width="10" height="3" rx="1" fill="currentColor"/>
      <rect x="6" y="10" width="7" height="3" rx="1" fill="currentColor"/>
    </svg>
  </button>

  <div class="fa-sep"></div>

  <!-- ─── Vertical group ─── -->
  <div class="fa-group-label">V</div>

  <button class="fa-btn" type="button" (click)="align('top')" title="Aligner en haut">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="2" width="14" height="2" rx="1" fill="currentColor"/>
      <rect x="5" y="5" width="3" height="10" rx="1" fill="currentColor"/>
      <rect x="10" y="5" width="3" height="7" rx="1" fill="currentColor"/>
    </svg>
  </button>

  <button class="fa-btn" type="button" (click)="align('centerV')" title="Centrer verticalement">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="8" width="14" height="2" rx="1" fill="currentColor"/>
      <rect x="5" y="3" width="3" height="12" rx="1" fill="currentColor"/>
      <rect x="10" y="4.5" width="3" height="9" rx="1" fill="currentColor"/>
    </svg>
  </button>

  <button class="fa-btn" type="button" (click)="align('bottom')" title="Aligner en bas">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="14" width="14" height="2" rx="1" fill="currentColor"/>
      <rect x="5" y="3" width="3" height="10" rx="1" fill="currentColor"/>
      <rect x="10" y="6" width="3" height="7" rx="1" fill="currentColor"/>
    </svg>
  </button>

  <div class="fa-sep"></div>

  <!-- Close / deselect -->
  <button class="fa-btn fa-btn--close" type="button" (click)="close()" title="Désélectionner">
    <span nz-icon nzType="close" nzTheme="outline"></span>
  </button>

</div>
