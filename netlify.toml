[build]
  command = "npm run build:prod"
  publish = "dist/makertags/browser"
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/angular-runtime"

[dev]
  command = "ng serve"
  targetPort = 4200
  port = 8888
  autoLaunch = false

# Main branch (production)
[context.main]
  environment = { NEXT_PUBLIC_SITE_URL = "https://tagprintly.com", SITE_URL = "https://tagprintly.com" }

# feature/live-test branch — context name must match the exact branch name
[context."feature/live-test"]
  environment = { NEXT_PUBLIC_SITE_URL = "https://feature-live-test.tagprintly.com", SITE_URL = "https://feature-live-test.tagprintly.com" }
